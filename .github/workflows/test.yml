name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permessi espliciti per il GITHUB_TOKEN: serve `contents: write` allo
# step "Commit test report" per poter fare push del JSON aggiornato su main.
# Senza questo blocco si eredita il default org/repo, che a volte è read-only
# e fa fallire il push silenziosamente.
permissions:
  contents: write

# Evita run in parallelo sulla stessa ref. Se durante l'esecuzione arriva un
# nuovo merge su main, il run vecchio viene annullato: solo l'ultimo finisce
# e committa i risultati. Per le PR (event_name diverso) è gestito a parte
# così i merge su main non killano i check dei PR aperti.
concurrency:
  group: test-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need write access to commit the report back on push to main
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history so rebase can resolve diverged refs
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        # Always generate the report, even when tests fail (continue-on-error
        # is handled below so the commit step still runs).
        id: run_tests
        continue-on-error: true
        run: |
          mkdir -p test-reports
          pnpm vitest run \
            --reporter=default \
            --reporter=json \
            --outputFile=test-reports/vitest-results.json
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-test-secret-key-at-least-32-chars-!!' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://mock:mock@localhost/mock' }}

      # Force-push del report sul branch ci-results (orphan, niente storia).
      #
      # Architettura:
      #   - main resta strict (require PR + status checks + no bypass)
      #   - il bot non ha bisogno di scrivere su main, scrive solo su ci-results
      #   - ci-results è un branch dedicato senza protezioni, una sola entry
      #     che viene rimpiazzata ad ogni push (orphan + force)
      #   - la dashboard /admin/tests legge il file via GitHub Contents API
      #
      # Solo su push a main, non su PR (le PR non devono toccare ci-results).
      - name: Push report to ci-results branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SOURCE_SHA=$(git rev-parse HEAD)
          SOURCE_MSG=$(git log -1 --format=%s)

          # Salva il report fuori dal working tree perché git rm -rf .
          # cancellerà tutta la directory test-reports
          cp test-reports/vitest-results.json /tmp/vitest-results.json

          # Branch orphan: nessuna parent commit, partenza da zero
          git checkout --orphan ci-results-tmp
          git rm -rf . > /dev/null 2>&1 || true

          # Aggiungi solo il report
          cp /tmp/vitest-results.json vitest-results.json
          git add vitest-results.json
          git commit -m "ci: vitest report from main@${SOURCE_SHA:0:7} — ${SOURCE_MSG}"

          # Force push: ad ogni run il branch ha un solo commit, niente accumulo
          git push origin HEAD:ci-results --force

      # Re-fail the job if tests actually failed (after the report push).
      - name: Propagate test failure
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
